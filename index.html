<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ARS — Bibliothèque d'Art Plastique</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400;1,600&family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0a0905;
      --surface: #12100c;
      --card-bg: #1c1912;
      --card-border: #2e2a22;
      --gold: #c9a85c;
      --gold-dim: #8a7040;
      --cream: #f0e8d5;
      --cream-dim: #a09070;
      --text: #e8ddc8;
      --text-dim: #7a7060;
      --tag-bg: #1e1c16;
      --tag-border: #3a3628;
      --red-accent: #8b3a2a;
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: 'Cormorant Garamond', Georgia, serif;
      overflow: hidden;
    }

    /* ── HEADER ── */
    header {
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 100;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 18px 36px;
      background: linear-gradient(to bottom, rgba(10,9,5,0.98) 80%, transparent);
      gap: 24px;
    }

    .logo {
      font-family: 'Playfair Display', Georgia, serif;
      font-size: 22px;
      font-weight: 700;
      letter-spacing: 0.18em;
      color: var(--gold);
      text-transform: uppercase;
      white-space: nowrap;
      flex-shrink: 0;
    }
    .logo span {
      color: var(--cream-dim);
      font-size: 11px;
      font-weight: 400;
      letter-spacing: 0.3em;
      display: block;
      margin-top: -3px;
    }

    .search-bar {
      flex: 1;
      max-width: 420px;
      position: relative;
    }
    .search-bar input {
      width: 100%;
      background: rgba(255,255,255,0.04);
      border: 1px solid var(--card-border);
      border-radius: 2px;
      padding: 9px 40px 9px 16px;
      color: var(--text);
      font-family: 'Cormorant Garamond', Georgia, serif;
      font-size: 15px;
      outline: none;
      transition: border-color 0.2s;
    }
    .search-bar input::placeholder { color: var(--text-dim); }
    .search-bar input:focus { border-color: var(--gold-dim); }
    .search-bar svg {
      position: absolute;
      right: 12px; top: 50%;
      transform: translateY(-50%);
      opacity: 0.4;
      pointer-events: none;
    }

    .header-right {
      display: flex;
      align-items: center;
      gap: 12px;
      flex-shrink: 0;
    }

    .btn-add {
      background: var(--gold);
      color: #0a0905;
      border: none;
      border-radius: 2px;
      padding: 9px 18px;
      font-family: 'Cormorant Garamond', Georgia, serif;
      font-size: 14px;
      font-weight: 600;
      letter-spacing: 0.08em;
      cursor: pointer;
      transition: background 0.2s;
      white-space: nowrap;
    }
    .btn-add:hover { background: #d9b870; }

    .counter {
      font-size: 12px;
      color: var(--text-dim);
      letter-spacing: 0.1em;
    }

    /* ── FILTERS ── */
    .filters-bar {
      position: fixed;
      top: 72px; left: 0; right: 0;
      z-index: 90;
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 10px 36px;
      background: rgba(10,9,5,0.92);
      border-bottom: 1px solid var(--card-border);
      overflow-x: auto;
      scrollbar-width: none;
    }
    .filters-bar::-webkit-scrollbar { display: none; }

    .filter-label {
      font-size: 11px;
      letter-spacing: 0.2em;
      color: var(--gold-dim);
      text-transform: uppercase;
      white-space: nowrap;
      margin-right: 4px;
      flex-shrink: 0;
    }

    .filter-chip {
      border: 1px solid var(--tag-border);
      background: var(--tag-bg);
      color: var(--cream-dim);
      border-radius: 2px;
      padding: 5px 12px;
      font-family: 'Cormorant Garamond', Georgia, serif;
      font-size: 13px;
      cursor: pointer;
      white-space: nowrap;
      transition: all 0.15s;
      flex-shrink: 0;
    }
    .filter-chip:hover { border-color: var(--gold-dim); color: var(--gold); }
    .filter-chip.active { background: var(--gold); color: #0a0905; border-color: var(--gold); font-weight: 600; }

    /* ── CAROUSEL WRAPPER ── */
    .scene {
      position: fixed;
      top: 118px; bottom: 0; left: 0; right: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    .carousel-track {
      display: flex;
      align-items: center;
      gap: 0;
      transition: transform 0.55s cubic-bezier(0.4, 0, 0.2, 1);
      will-change: transform;
      padding: 0 50vw;
    }

    /* ── CARDS ── */
    .card-wrapper {
      flex-shrink: 0;
      width: 680px;
      padding: 0 12px;
      transition: all 0.55s cubic-bezier(0.4, 0, 0.2, 1);
      cursor: pointer;
    }

    .card {
      background: var(--card-bg);
      border: 1px solid var(--card-border);
      border-radius: 3px;
      overflow: hidden;
      transition: all 0.55s cubic-bezier(0.4, 0, 0.2, 1);
      position: relative;
    }

    /* Side cards */
    .card-wrapper.side {
      opacity: 0;
      transform: scale(0.72) translateY(20px);
      pointer-events: none;
    }
    .card-wrapper.near {
      opacity: 0.55;
      transform: scale(0.78) translateY(12px);
      pointer-events: auto;
    }
    .card-wrapper.mid {
      opacity: 0.7;
      transform: scale(0.85) translateY(6px);
      pointer-events: auto;
    }
    .card-wrapper.active {
      opacity: 1;
      transform: scale(1) translateY(0);
      pointer-events: auto;
      z-index: 10;
    }

    /* Card image section */
    .card-image-section {
      position: relative;
      overflow: hidden;
      background: #0d0b08;
    }
    .card-wrapper.active .card-image-section {
      height: 320px;
    }
    .card-wrapper:not(.active) .card-image-section {
      height: 240px;
    }

    .card-image-section img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center top;
      display: block;
      transition: transform 0.6s ease;
    }
    .card-wrapper.active .card-image-section:hover img {
      transform: scale(1.03);
    }

    .img-overlay {
      position: absolute;
      inset: 0;
      background: linear-gradient(to top, rgba(10,9,5,0.5) 0%, transparent 50%);
      transition: opacity 0.3s;
    }
    .card-wrapper.active .card-image-section:hover .img-overlay {
      opacity: 0.3;
    }

    .zoom-hint {
      position: absolute;
      bottom: 12px; right: 12px;
      background: rgba(0,0,0,0.6);
      border: 1px solid rgba(201,168,92,0.4);
      color: var(--gold);
      font-size: 11px;
      letter-spacing: 0.12em;
      padding: 5px 10px;
      border-radius: 2px;
      opacity: 0;
      transition: opacity 0.3s;
      text-transform: uppercase;
      pointer-events: none;
    }
    .card-wrapper.active .card-image-section:hover .zoom-hint { opacity: 1; }

    .movement-badge {
      position: absolute;
      top: 12px; left: 12px;
      background: rgba(0,0,0,0.7);
      border-left: 2px solid var(--gold);
      color: var(--cream);
      font-size: 10px;
      letter-spacing: 0.2em;
      padding: 4px 10px;
      text-transform: uppercase;
    }

    /* Card text section */
    .card-text-section {
      padding: 20px 24px;
    }

    .card-header-row {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      margin-bottom: 4px;
    }

    .card-title {
      font-family: 'Playfair Display', Georgia, serif;
      font-size: 20px;
      font-style: italic;
      font-weight: 400;
      color: var(--cream);
      line-height: 1.2;
    }
    .card-wrapper:not(.active) .card-title { font-size: 16px; }

    .card-date {
      font-size: 13px;
      color: var(--gold-dim);
      letter-spacing: 0.08em;
      white-space: nowrap;
      margin-left: 12px;
    }

    .card-artist {
      font-size: 14px;
      font-style: italic;
      color: var(--gold);
      margin-bottom: 10px;
      letter-spacing: 0.04em;
    }

    .card-divider {
      border: none;
      border-top: 1px solid var(--card-border);
      margin: 10px 0;
    }

    .card-description {
      font-size: 15px;
      line-height: 1.7;
      color: var(--text-dim);
      display: -webkit-box;
      -webkit-line-clamp: 4;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }
    .card-wrapper.active .card-description {
      -webkit-line-clamp: 5;
    }

    .card-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 5px;
      margin-top: 14px;
    }

    .tag {
      background: var(--tag-bg);
      border: 1px solid var(--tag-border);
      color: var(--text-dim);
      border-radius: 2px;
      padding: 3px 9px;
      font-size: 11px;
      letter-spacing: 0.1em;
      cursor: pointer;
      transition: all 0.15s;
    }
    .tag:hover { border-color: var(--gold-dim); color: var(--gold); }

    /* ── NAV ARROWS ── */
    .nav-arrow {
      position: fixed;
      top: 50%; transform: translateY(-50%);
      z-index: 50;
      background: rgba(12,10,7,0.8);
      border: 1px solid var(--card-border);
      color: var(--gold);
      width: 44px; height: 44px;
      border-radius: 2px;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer;
      transition: all 0.2s;
      font-size: 20px;
    }
    .nav-arrow:hover { background: rgba(201,168,92,0.15); border-color: var(--gold); }
    .nav-arrow.prev { left: 16px; }
    .nav-arrow.next { right: 16px; }
    .nav-arrow:disabled { opacity: 0.2; pointer-events: none; }

    /* ── DOTS ── */
    .dots {
      position: fixed;
      bottom: 16px; left: 50%; transform: translateX(-50%);
      z-index: 50;
      display: flex;
      gap: 6px;
      align-items: center;
    }
    .dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: var(--text-dim);
      cursor: pointer;
      transition: all 0.3s;
    }
    .dot.active {
      background: var(--gold);
      width: 22px;
      border-radius: 3px;
    }

    /* ── LIGHTBOX ── */
    .lightbox {
      position: fixed;
      inset: 0;
      z-index: 200;
      background: rgba(5,4,2,0.97);
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.35s;
      cursor: zoom-out;
    }
    .lightbox.open { opacity: 1; pointer-events: all; }

    .lightbox img {
      max-width: 90vw;
      max-height: 90vh;
      object-fit: contain;
      border: 1px solid var(--card-border);
      transition: transform 0.35s;
    }
    .lightbox.open img { transform: scale(1); }

    .lightbox-close {
      position: absolute;
      top: 24px; right: 28px;
      color: var(--gold);
      font-size: 28px;
      cursor: pointer;
      background: none;
      border: none;
      line-height: 1;
      opacity: 0.7;
      transition: opacity 0.2s;
    }
    .lightbox-close:hover { opacity: 1; }

    .lightbox-caption {
      position: absolute;
      bottom: 28px; left: 50%; transform: translateX(-50%);
      text-align: center;
      color: var(--cream-dim);
      font-size: 14px;
      font-style: italic;
      letter-spacing: 0.05em;
    }

    /* ── ADD FORM ── */
    .modal-overlay {
      position: fixed;
      inset: 0;
      z-index: 300;
      background: rgba(5,4,2,0.92);
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s;
    }
    .modal-overlay.open { opacity: 1; pointer-events: all; }

    .modal {
      background: var(--card-bg);
      border: 1px solid var(--card-border);
      border-radius: 3px;
      padding: 36px 40px;
      width: 520px;
      max-height: 85vh;
      overflow-y: auto;
      scrollbar-width: thin;
      scrollbar-color: var(--gold-dim) transparent;
    }

    .modal h2 {
      font-family: 'Playfair Display', Georgia, serif;
      font-size: 22px;
      color: var(--cream);
      margin-bottom: 24px;
      letter-spacing: 0.02em;
    }
    .modal h2 span { color: var(--gold); font-style: italic; }

    .form-row { margin-bottom: 16px; }
    .form-row label {
      display: block;
      font-size: 11px;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--gold-dim);
      margin-bottom: 6px;
    }
    .form-row input, .form-row textarea, .form-row select {
      width: 100%;
      background: rgba(255,255,255,0.04);
      border: 1px solid var(--card-border);
      border-radius: 2px;
      padding: 10px 14px;
      color: var(--text);
      font-family: 'Cormorant Garamond', Georgia, serif;
      font-size: 15px;
      outline: none;
      transition: border-color 0.2s;
    }
    .form-row input:focus, .form-row textarea:focus, .form-row select:focus {
      border-color: var(--gold-dim);
    }
    .form-row textarea { resize: vertical; min-height: 80px; }
    .form-row select option { background: #1c1912; }

    .form-actions {
      display: flex;
      gap: 12px;
      margin-top: 24px;
      justify-content: flex-end;
    }
    .btn-cancel {
      background: transparent;
      border: 1px solid var(--card-border);
      color: var(--text-dim);
      border-radius: 2px;
      padding: 9px 20px;
      font-family: 'Cormorant Garamond', Georgia, serif;
      font-size: 14px;
      cursor: pointer;
      transition: all 0.2s;
    }
    .btn-cancel:hover { border-color: var(--gold-dim); color: var(--cream); }
    .btn-save {
      background: var(--gold);
      border: none;
      color: #0a0905;
      border-radius: 2px;
      padding: 9px 24px;
      font-family: 'Cormorant Garamond', Georgia, serif;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
    }
    .btn-save:hover { background: #d9b870; }

    /* ── NO RESULTS ── */
    .no-results {
      position: fixed;
      top: 50%; left: 50%; transform: translate(-50%,-50%);
      text-align: center;
      color: var(--text-dim);
      font-size: 18px;
      font-style: italic;
      display: none;
    }
    .no-results.show { display: block; }

    /* ── SCROLLBAR ── */
    ::-webkit-scrollbar { width: 4px; height: 4px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--gold-dim); border-radius: 2px; }

    /* Gradient edges */
    .scene::before, .scene::after {
      content: '';
      position: absolute;
      top: 0; bottom: 0;
      width: 200px;
      z-index: 20;
      pointer-events: none;
    }
    .scene::before {
      left: 0;
      background: linear-gradient(to right, var(--bg) 0%, transparent 100%);
    }
    .scene::after {
      right: 0;
      background: linear-gradient(to left, var(--bg) 0%, transparent 100%);
    }

    @media (max-width: 768px) {
      .card-wrapper { width: 88vw; }
      header { padding: 14px 16px; }
      .filters-bar { padding: 8px 16px; }
      .search-bar { max-width: 200px; }
    }
  </style>
</head>
<body>

<!-- HEADER -->
<header>
  <div class="logo">
    ARS
    <span>Bibliothèque d'Art Plastique</span>
  </div>
  <div class="search-bar">
    <input type="text" id="searchInput" placeholder="Rechercher une œuvre, un artiste…" oninput="handleSearch()">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
    </svg>
  </div>
  <div class="header-right">
    <span class="counter" id="counter"></span>
    <button class="btn-add" onclick="openModal()">+ Ajouter une fiche</button>
  </div>
</header>

<!-- FILTERS -->
<div class="filters-bar" id="filtersBar">
  <span class="filter-label">Courant :</span>
  <button class="filter-chip active" data-filter="all" onclick="setFilter('all', this)">Toutes les œuvres</button>
</div>

<!-- CAROUSEL -->
<div class="scene">
  <div class="carousel-track" id="carouselTrack"></div>
</div>

<!-- NAV -->
<button class="nav-arrow prev" id="prevBtn" onclick="navigate(-1)">&#8592;</button>
<button class="nav-arrow next" id="nextBtn" onclick="navigate(1)">&#8594;</button>

<!-- DOTS -->
<div class="dots" id="dotsBar"></div>

<!-- NO RESULTS -->
<div class="no-results" id="noResults">
  Aucune œuvre ne correspond à cette recherche.
</div>

<!-- LIGHTBOX -->
<div class="lightbox" id="lightbox" onclick="closeLightbox()">
  <button class="lightbox-close" onclick="closeLightbox()">×</button>
  <img id="lightboxImg" src="" alt="">
  <div class="lightbox-caption" id="lightboxCaption"></div>
</div>

<!-- ADD MODAL -->
<div class="modal-overlay" id="modalOverlay">
  <div class="modal" onclick="event.stopPropagation()">
    <h2>Nouvelle <span>fiche</span></h2>
    <div class="form-row">
      <label>Titre de l'œuvre *</label>
      <input type="text" id="fTitle" placeholder="ex : La Joconde">
    </div>
    <div class="form-row">
      <label>Artiste *</label>
      <input type="text" id="fArtist" placeholder="ex : Léonard de Vinci">
    </div>
    <div class="form-row">
      <label>Date / Période *</label>
      <input type="text" id="fDate" placeholder="ex : 1503–1519">
    </div>
    <div class="form-row">
      <label>Courant artistique *</label>
      <input type="text" id="fMovement" placeholder="ex : Renaissance italienne">
    </div>
    <div class="form-row">
      <label>URL de l'image</label>
      <input type="text" id="fImage" placeholder="https://…">
    </div>
    <div class="form-row">
      <label>Description</label>
      <textarea id="fDesc" placeholder="Contexte, technique, analyse de l'œuvre…" rows="4"></textarea>
    </div>
    <div class="form-row">
      <label>Mots-clés (séparés par des virgules)</label>
      <input type="text" id="fTags" placeholder="ex : portrait, huile sur bois, sfumato">
    </div>
    <div class="form-row">
      <label>Musée / Collection</label>
      <input type="text" id="fMuseum" placeholder="ex : Musée du Louvre, Paris">
    </div>
    <div class="form-actions">
      <button class="btn-cancel" onclick="closeModal()">Annuler</button>
      <button class="btn-save" onclick="saveCard()">Enregistrer la fiche</button>
    </div>
  </div>
</div>

<script>
// ─────────────────────────────────────────────
// DATA — 10 œuvres d'art avec images Wikimedia
// ─────────────────────────────────────────────
const BASE_ARTWORKS = [

    description: "Portrait d'une femme à mi-corps devant un paysage imaginaire, commandé selon Vasari par Francesco del Giocondo pour célébrer la naissance de leur second fils. De Vinci emploie la technique du sfumato — des transitions imperceptibles entre lumières et ombres — pour créer l'ambiguïté du célèbre sourire. L'œuvre révolutionne le genre du portrait en orientant le modèle vers le spectateur, créant un dialogue intime et universel.",

// ─────────────────────────────────────────────
// STATE
// ─────────────────────────────────────────────
let artworks = [...BASE_ARTWORKS];
let filteredArtworks = [...artworks];
let currentIndex = 0;
let activeFilter = 'all';
let searchQuery = '';

// ─────────────────────────────────────────────
// INIT
// ─────────────────────────────────────────────
function init() {
  buildFilters();
  renderCarousel();
  updateNav();
  updateCounter();
}

// ─────────────────────────────────────────────
// FILTERS
// ─────────────────────────────────────────────
function buildFilters() {
  const movements = [...new Set(artworks.map(a => a.movement.split('/')[0].trim()))].sort();
  const bar = document.getElementById('filtersBar');
  // Keep the "all" button, add movements
  const existing = bar.querySelectorAll('[data-filter]:not([data-filter="all"])');
  existing.forEach(e => e.remove());

  movements.forEach(m => {
    const btn = document.createElement('button');
    btn.className = 'filter-chip';
    btn.dataset.filter = m;
    btn.textContent = m;
    btn.onclick = () => setFilter(m, btn);
    bar.appendChild(btn);
  });
}

function setFilter(filter, el) {
  activeFilter = filter;
  document.querySelectorAll('.filter-chip').forEach(c => c.classList.remove('active'));
  el.classList.add('active');
  applyFilters();
}

function handleSearch() {
  searchQuery = document.getElementById('searchInput').value.toLowerCase().trim();
  applyFilters();
}

function applyFilters() {
  filteredArtworks = artworks.filter(a => {
    const matchMovement = activeFilter === 'all' || a.movement.toLowerCase().includes(activeFilter.toLowerCase());
    const matchSearch = !searchQuery ||
      a.title.toLowerCase().includes(searchQuery) ||
      a.artist.toLowerCase().includes(searchQuery) ||
      a.movement.toLowerCase().includes(searchQuery) ||
      a.tags.some(t => t.toLowerCase().includes(searchQuery)) ||
      a.description.toLowerCase().includes(searchQuery);
    return matchMovement && matchSearch;
  });

  currentIndex = 0;
  renderCarousel();
  updateNav();
  updateCounter();

  const noRes = document.getElementById('noResults');
  noRes.classList.toggle('show', filteredArtworks.length === 0);
}

// ─────────────────────────────────────────────
// CAROUSEL
// ─────────────────────────────────────────────
const CARD_WIDTH = 704; // card width + gap

function renderCarousel() {
  const track = document.getElementById('carouselTrack');
  track.innerHTML = '';

  const dots = document.getElementById('dotsBar');
  dots.innerHTML = '';

  filteredArtworks.forEach((art, i) => {
    // Card
    const wrapper = document.createElement('div');
    wrapper.className = 'card-wrapper';
    wrapper.dataset.index = i;
    wrapper.innerHTML = buildCardHTML(art);
    wrapper.onclick = () => {
      if (i !== currentIndex) navigate(i - currentIndex);
    };
    track.appendChild(wrapper);

    // Dot
    const dot = document.createElement('div');
    dot.className = 'dot';
    dot.onclick = () => goTo(i);
    dots.appendChild(dot);
  });

  positionCarousel();
}

function buildCardHTML(art) {
  const tagsHTML = art.tags.map(t =>
    `<span class="tag" onclick="quickFilter('${t}', event)">${t}</span>`
  ).join('');

  return `
    <div class="card">
      <div class="card-image-section" onclick="openLightbox('${art.image}', '${escapeAttr(art.title)} — ${escapeAttr(art.artist)}, ${art.date}', event)">
        <img src="${art.image}" alt="${escapeAttr(art.title)}" loading="lazy">
        <div class="img-overlay"></div>
        <div class="movement-badge">${art.movement.split('/')[0].trim()}</div>
        <div class="zoom-hint">Voir en grand</div>
      </div>
      <div class="card-text-section">
        <div class="card-header-row">
          <div class="card-title">${art.title}</div>
          <div class="card-date">${art.date}</div>
        </div>
        <div class="card-artist">${art.artist} &mdash; <em style="color:var(--text-dim);font-style:normal;font-size:13px">${art.museum}</em></div>
        <hr class="card-divider">
        <div class="card-description">${art.description}</div>
        <div class="card-tags">${tagsHTML}</div>
      </div>
    </div>`;
}

function escapeAttr(s) {
  return s.replace(/'/g, "\\'").replace(/"/g, '&quot;');
}

function positionCarousel() {
  const track = document.getElementById('carouselTrack');
  const wrappers = track.querySelectorAll('.card-wrapper');
  const dots = document.getElementById('dotsBar').querySelectorAll('.dot');

  wrappers.forEach((w, i) => {
    const diff = i - currentIndex;
    w.className = 'card-wrapper';
    if (diff === 0) w.classList.add('active');
    else if (Math.abs(diff) === 1) w.classList.add('mid');
    else if (Math.abs(diff) === 2) w.classList.add('near');
    else w.classList.add('side');
  });

  dots.forEach((d, i) => d.classList.toggle('active', i === currentIndex));

  const offset = currentIndex * CARD_WIDTH;
  track.style.transform = `translateX(${-offset}px)`;
}

function navigate(delta) {
  const newIndex = currentIndex + delta;
  if (newIndex < 0 || newIndex >= filteredArtworks.length) return;
  currentIndex = newIndex;
  positionCarousel();
  updateNav();
}

function goTo(i) {
  currentIndex = i;
  positionCarousel();
  updateNav();
}

function updateNav() {
  document.getElementById('prevBtn').disabled = currentIndex <= 0;
  document.getElementById('nextBtn').disabled = currentIndex >= filteredArtworks.length - 1;
}

function updateCounter() {
  document.getElementById('counter').textContent =
    `${filteredArtworks.length} œuvre${filteredArtworks.length > 1 ? 's' : ''}`;
}

function quickFilter(tag, e) {
  e.stopPropagation();
  document.getElementById('searchInput').value = tag;
  searchQuery = tag.toLowerCase();
  activeFilter = 'all';
  document.querySelectorAll('.filter-chip').forEach(c =>
    c.classList.toggle('active', c.dataset.filter === 'all')
  );
  applyFilters();
}

// ─────────────────────────────────────────────
// LIGHTBOX
// ─────────────────────────────────────────────
function openLightbox(src, caption, e) {
  e.stopPropagation();
  const lb = document.getElementById('lightbox');
  document.getElementById('lightboxImg').src = src;
  document.getElementById('lightboxCaption').textContent = caption;
  lb.classList.add('open');
}

function closeLightbox() {
  document.getElementById('lightbox').classList.remove('open');
}

// ─────────────────────────────────────────────
// MODAL — ADD FICHE
// ─────────────────────────────────────────────
function openModal() {
  document.getElementById('modalOverlay').classList.add('open');
}

function closeModal() {
  document.getElementById('modalOverlay').classList.remove('open');
  ['fTitle','fArtist','fDate','fMovement','fImage','fDesc','fTags','fMuseum'].forEach(id => {
    document.getElementById(id).value = '';
  });
}

function saveCard() {
  const title = document.getElementById('fTitle').value.trim();
  const artist = document.getElementById('fArtist').value.trim();
  const date = document.getElementById('fDate').value.trim();
  const movement = document.getElementById('fMovement').value.trim();

  if (!title || !artist || !date || !movement) {
    alert('Veuillez remplir les champs obligatoires (*).');
    return;
  }

  const newCard = {
    id: Date.now(),
    title,
    artist,
    date,
    movement,
    museum: document.getElementById('fMuseum').value.trim() || 'Collection privée',
    image: document.getElementById('fImage').value.trim() ||
      `https://via.placeholder.com/800x500/1c1912/c9a85c?text=${encodeURIComponent(title)}`,
    description: document.getElementById('fDesc').value.trim() || 'Aucune description disponible.',
    tags: document.getElementById('fTags').value.split(',').map(t => t.trim()).filter(Boolean)
  };

  artworks.push(newCard);
  buildFilters();
  applyFilters();
  closeModal();
  goTo(filteredArtworks.length - 1);
}

// ─────────────────────────────────────────────
// KEYBOARD NAV
// ─────────────────────────────────────────────
document.addEventListener('keydown', e => {
  if (document.getElementById('modalOverlay').classList.contains('open')) return;
  if (document.getElementById('searchInput') === document.activeElement) return;
  if (e.key === 'ArrowLeft') navigate(-1);
  if (e.key === 'ArrowRight') navigate(1);
  if (e.key === 'Escape') closeLightbox();
});

// Close modal when clicking overlay
document.getElementById('modalOverlay').onclick = closeModal;

// ─────────────────────────────────────────────
// TOUCH / SWIPE
// ─────────────────────────────────────────────
let touchStartX = 0;
document.querySelector('body').addEventListener('touchstart', e => {
  touchStartX = e.changedTouches[0].clientX;
}, { passive: true });
document.querySelector('body').addEventListener('touchend', e => {
  const dx = e.changedTouches[0].clientX - touchStartX;
  if (Math.abs(dx) > 50) navigate(dx < 0 ? 1 : -1);
}, { passive: true });

// ─────────────────────────────────────────────
// START
// ─────────────────────────────────────────────
init();
</script>
</body>
</html>
